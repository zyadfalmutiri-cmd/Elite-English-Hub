kind = "web"
previewPath = "/"
title = "تعلّم الإنجليزية"
version = "1.0.0"
id = "artifacts/english-learn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23035

[services.development]
run = "pnpm --filter @workspace/english-learn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/english-learn", "run", "build" ]
publicDir = "artifacts/english-learn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23035"
BASE_PATH = "/"
